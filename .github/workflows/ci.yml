name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install Werkzeug==2.2.2
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v -k "not ready and not delete and not get_messages"
        env:
          MYSQL_HOST: localhost
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DB: devops

      - name: Build Docker image
        run: docker build -t flaskapp:${{ github.sha }} .

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'flaskapp:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag flaskapp:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/flaskapp:${{ github.sha }}
          docker tag flaskapp:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/flaskapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/flaskapp:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/flaskapp:latest