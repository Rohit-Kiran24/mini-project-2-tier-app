<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flask · MySQL · K8s Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           font-size: 13px; background: #f5f5f4; color: #1a1a18; }
    .navbar { background: #fff; border-bottom: 1px solid #e5e5e3;
              padding: 10px 20px; display: flex; align-items: center;
              justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
    .brand-box { width: 26px; height: 26px; background: #111; border-radius: 6px;
                 display: flex; align-items: center; justify-content: center;
                 color: #fff; font-size: 10px; font-weight: 700; }
    .badges { display: flex; gap: 6px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
    .bg { background: #d1fae5; color: #065f46; }
    .bb { background: #dbeafe; color: #1e40af; }
    .br { background: #fee2e2; color: #991b1b; }
    .ba { background: #fef3c7; color: #92400e; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
                display: inline-block; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    .layout { display: grid; grid-template-columns: 1fr 290px; height: calc(100vh - 45px); }
    .main { display: flex; flex-direction: column; overflow: hidden; }
    .msg-feed { flex: 1; overflow-y: auto; padding: 14px 16px;
                display: flex; flex-direction: column; gap: 8px; background: #fff; }
    .sys-line { text-align: center; font-size: 11px; color: #a8a8a3; padding: 4px 0; }
    .bubble { display: flex; gap: 10px; align-items: flex-start; }
    .av { width: 28px; height: 28px; border-radius: 50%; display: flex;
          align-items: center; justify-content: center; font-size: 10px;
          font-weight: 600; flex-shrink: 0; }
    .bubble-inner { flex: 1; }
    .bubble-top { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
    .buser { font-size: 12px; font-weight: 600; }
    .btime { font-size: 10px; color: #a8a8a3; }
    .btext { font-size: 13px; background: #f5f5f4; padding: 8px 11px;
             border-radius: 2px 10px 10px 10px; display: inline-block;
             line-height: 1.55; max-width: 100%; word-break: break-word; }
    .del-btn { background: none; border: none; color: #c0bfba; cursor: pointer;
               font-size: 13px; padding: 2px 4px; opacity: 0; transition: opacity .15s; }
    .bubble:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #dc2626; }
    .compose { border-top: 1px solid #e5e5e3; padding: 10px 14px;
               display: flex; gap: 8px; align-items: flex-end; background: #f9f9f8; }
    .compose textarea { flex: 1; padding: 8px 11px; border: 1px solid #d5d5d0;
                        border-radius: 10px; font-size: 13px; resize: none; outline: none;
                        font-family: inherit; background: #fff; line-height: 1.5;
                        min-height: 38px; max-height: 80px; }
    .compose textarea:focus { border-color: #a0a0a0; }
    .send-btn { width: 34px; height: 34px; border-radius: 50%; background: #111;
                border: none; cursor: pointer; display: flex; align-items: center;
                justify-content: center; flex-shrink: 0; }
    .send-btn:hover { opacity: .8; }
    .send-btn svg { width: 14px; height: 14px; stroke: #fff; fill: none;
                    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar { background: #fff; border-left: 1px solid #e5e5e3;
               overflow-y: auto; display: flex; flex-direction: column; }
    .sb { padding: 12px 14px; border-bottom: 1px solid #e5e5e3; }
    .sb-title { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase;
                letter-spacing: .06em; margin-bottom: 10px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat { background: #f5f5f4; border-radius: 8px; padding: 8px 10px; }
    .stat-val { font-size: 20px; font-weight: 600; }
    .stat-lbl { font-size: 10px; color: #888; margin-top: 1px; }
    .bar-wrap { margin-bottom: 7px; }
    .bar-label { display: flex; justify-content: space-between;
                 font-size: 10px; color: #888; margin-bottom: 3px; }
    .bar-bg { height: 5px; background: #e5e5e3; border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
    .pod-list { display: flex; flex-direction: column; gap: 6px; }
    .pod { border: 1px solid #e5e5e3; border-radius: 8px; padding: 8px 10px; }
    .pod.running  { border-left: 3px solid #22c55e; border-radius: 0 8px 8px 0; }
    .pod.crashed  { border-left: 3px solid #ef4444; border-radius: 0 8px 8px 0; }
    .pod.pending  { border-left: 3px solid #f59e0b; border-radius: 0 8px 8px 0; }
    .pod.recovering{ border-left: 3px solid #3b82f6; border-radius: 0 8px 8px 0; }
    .pod-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .pod-name { font-size: 11px; font-weight: 600; font-family: monospace; }
    .pod-badge { font-size: 9px; padding: 1px 7px; border-radius: 99px; font-weight: 600; }
    .pb-running   { background: #d1fae5; color: #065f46; }
    .pb-crashed   { background: #fee2e2; color: #991b1b; }
    .pb-pending   { background: #fef3c7; color: #92400e; }
    .pb-recovering{ background: #dbeafe; color: #1e40af; }
    .pod-meta { display: flex; gap: 10px; font-size: 10px; color: #888; }
    .pod-meta span { color: #1a1a18; font-weight: 500; }
    .rbar { margin-top: 5px; height: 3px; background: #e5e5e3; border-radius: 99px;
            overflow: hidden; display: none; }
    .rbar.show { display: block; }
    .rbar-fill { height: 100%; background: #3b82f6; border-radius: 99px;
                 animation: rfill 3s linear forwards; }
    @keyframes rfill { from{width:0} to{width:100%} }
    .ctrl-list { display: flex; flex-direction: column; gap: 6px; }
    .cb { padding: 7px 10px; border-radius: 8px; font-size: 11px; font-weight: 600;
          cursor: pointer; font-family: inherit; border: 1px solid #d5d5d0;
          background: #fff; color: #1a1a18; text-align: left; width: 100%; }
    .cb:hover { background: #f5f5f4; }
    .cb:active { transform: scale(.98); }
    .cb.danger { border-color: #fca5a5; color: #dc2626; }
    .cb.danger:hover { background: #fff1f1; }
    .cb.primary { border-color: #93c5fd; color: #1d4ed8; }
    .cb.primary:hover { background: #eff6ff; }
    .cb.success { border-color: #86efac; color: #15803d; }
    .cb.success:hover { background: #f0fdf4; }
    .elog { font-family: monospace; font-size: 10px; display: flex;
            flex-direction: column; gap: 3px; }
    .el { display: flex; gap: 8px; }
    .el-t { color: #a8a8a3; flex-shrink: 0; }
    .ok   { color: #15803d; }
    .err  { color: #dc2626; }
    .warn { color: #b45309; }
    .info { color: #1d4ed8; }
  </style>
</head>
<body>
<div class="navbar">
  <div class="brand">
    <div class="brand-box">K8s</div>
    mini-project · Flask + MySQL on EKS
  </div>
  <div class="badges">
    <div class="live-dot"></div>
    <span class="badge bb" id="nb-pods">2 Running</span>
    <span class="badge" id="nb-db" style="background:#dbeafe;color:#1e40af">MySQL: up</span>
    <span class="badge" id="nb-source" style="background:#f5f5f4;color:#888;border:1px solid #e5e5e3">live</span>
  </div>
</div>

<div class="layout">
  <div class="main">
    <div class="msg-feed" id="msg-feed">
      <div class="sys-line">Loading messages from MySQL...</div>
    </div>
    <div class="compose">
      <textarea id="ta" placeholder="Post a message to MySQL..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postMsg();}"></textarea>
      <button class="send-btn" onclick="postMsg()">
        <svg viewBox="0 0 16 16"><line x1="2" y1="8" x2="13" y2="8"/>
          <polyline points="9 4 13 8 9 12"/></svg>
      </button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sb">
      <div class="sb-title">Cluster stats</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-val" id="st-pods">-</div><div class="stat-lbl">Pods running</div></div>
        <div class="stat"><div class="stat-val" id="st-restarts">-</div><div class="stat-lbl">Total restarts</div></div>
        <div class="stat"><div class="stat-val" id="st-msgs">-</div><div class="stat-lbl">DB messages</div></div>
        <div class="stat"><div class="stat-val" id="st-uptime">0s</div><div class="stat-lbl">Uptime</div></div>
      </div>
    </div>

    <div class="sb">
      <div class="sb-title">Load</div>
      <div class="bar-wrap">
        <div class="bar-label"><span>CPU</span><span id="cpu-v">-</span></div>
        <div class="bar-bg"><div class="bar-fill" id="cpu-b" style="width:0;background:#3b82f6"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>Memory</span><span id="mem-v">-</span></div>
        <div class="bar-bg"><div class="bar-fill" id="mem-b" style="width:0;background:#10b981"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>Requests/s</span><span id="rps-v">-</span></div>
        <div class="bar-bg"><div class="bar-fill" id="rps-b" style="width:0;background:#f59e0b"></div></div>
      </div>
    </div>

    <div class="sb">
      <div class="sb-title">Pods</div>
      <div class="pod-list" id="pod-list">
        <div style="color:#a8a8a3;font-size:11px">Loading...</div>
      </div>
    </div>

    <div class="sb">
      <div class="sb-title">Controls</div>
      <div class="ctrl-list">
        <button class="cb primary" onclick="spikeLoad()">Spike load (stress test)</button>
        <button class="cb danger" onclick="addLog('Use: kubectl delete pod flaskapp-* --force','warn')">Crash pod - use kubectl</button>
        <button class="cb success" onclick="addLog('Use: kubectl scale deploy/flaskapp --replicas=3','info')">Scale - use kubectl</button>
      </div>
    </div>

    <div class="sb">
      <div class="sb-title">Event log</div>
      <div class="elog" id="elog"></div>
    </div>
  </div>
</div>

<script>
const avPal=[['#dbeafe','#1e40af'],['#d1fae5','#065f46'],['#fef3c7','#92400e'],['#ede9fe','#5b21b6'],['#fce7f3','#9d174d']];
const users=['Rohit','Kiran','Dev','Admin','User'];
let logLines=[], uptimeSecs=0, cpuBase=12, memBase=34, rpsBase=4;

function ts(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtUp(s){return s<60?s+'s':s<3600?Math.floor(s/60)+'m':Math.floor(s/3600)+'h'+Math.floor((s%3600)/60)+'m';}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function addLog(msg,type='info'){
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logLines.unshift({t,msg,type});
  if(logLines.length>80)logLines.pop();
  document.getElementById('elog').innerHTML=logLines.map(l=>`<div class="el"><span class="el-t">${l.t}</span><span class="${l.type}">${l.msg}</span></div>`).join('');
}

async function loadMsgs(){
  try{
    const r=await fetch('/api/messages');
    const d=await r.json();
    if(d.status!=='ok')throw new Error(d.error);
    const feed=document.getElementById('msg-feed');
    if(!d.messages.length){
      feed.innerHTML='<div class="sys-line">No messages yet. Post one!</div>';
      document.getElementById('st-msgs').textContent='0';
      return;
    }
    feed.innerHTML='<div class="sys-line">Flask · MySQL · twotier</div>'+
      d.messages.map((m,i)=>{
        const [bg,fg]=avPal[i%5];
        return`<div class="bubble">
          <div class="av" style="background:${bg};color:${fg}">${users[i%5][0]}</div>
          <div class="bubble-inner">
            <div class="bubble-top"><span class="buser">${users[i%5]}</span><span class="btime">${ts()}</span></div>
            <span class="btext">${m.message}</span>
          </div>
          <button class="del-btn" onclick="delMsg(${m.id})">x</button>
        </div>`;
      }).join('');
    feed.scrollTop=feed.scrollHeight;
    document.getElementById('st-msgs').textContent=d.count;
  }catch(e){addLog('GET /api/messages failed: '+e.message,'err');}
}

async function postMsg(){
  const ta=document.getElementById('ta');
  const v=ta.value.trim();
  if(!v)return;
  try{
    const r=await fetch('/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:v})});
    const d=await r.json();
    if(d.status!=='ok')throw new Error(d.error);
    ta.value='';
    addLog('INSERT INTO messages - ok','ok');
    loadMsgs();
  }catch(e){addLog('POST /api/messages failed: '+e.message,'err');}
}

async function delMsg(id){
  try{
    const r=await fetch('/api/messages/'+id,{method:'DELETE'});
    const d=await r.json();
    if(d.status!=='ok')throw new Error(d.error);
    addLog('DELETE FROM messages WHERE id='+id,'warn');
    loadMsgs();
  }catch(e){addLog('DELETE failed: '+e.message,'err');}
}

async function loadPods(){
  try{
    const r=await fetch('/api/pods');
    const d=await r.json();
    if(d.status!=='ok')throw new Error(d.error);
    document.getElementById('nb-source').textContent=d.source==='live'?'k8s live':'simulated';
    const running=d.pods.filter(p=>p.status==='running').length;
    const restarts=d.pods.reduce((s,p)=>s+p.restarts,0);
    document.getElementById('st-pods').textContent=running;
    document.getElementById('st-restarts').textContent=restarts;
    const nb=document.getElementById('nb-pods');
    nb.textContent=running+' Running';
    nb.className='badge '+(running===d.pods.length?'bg':running===0?'br':'ba');
    document.getElementById('pod-list').innerHTML=d.pods.map(p=>`
      <div class="pod ${p.status}">
        <div class="pod-head">
          <span class="pod-name">${p.name}</span>
          <span class="pod-badge pb-${p.status}">${p.status}</span>
        </div>
        <div class="pod-meta">
          <span>Node <span>${p.node}</span></span>
          <span>Restarts <span>${p.restarts}</span></span>
        </div>
        ${p.status==='recovering'?'<div class="rbar show"><div class="rbar-fill"></div></div>':''}
      </div>`).join('');
    const mysqlpod=d.pods.find(p=>p.name.includes('mysql'));
    if(mysqlpod){
      const db=document.getElementById('nb-db');
      db.textContent='MySQL: '+mysqlpod.status;
      db.className='badge '+(mysqlpod.status==='running'?'bb':'br');
    }
  }catch(e){addLog('GET /api/pods failed: '+e.message,'err');}
}

async function spikeLoad(){
  try{
    const r=await fetch('/api/spike',{method:'POST'});
    const d=await r.json();
    addLog(d.message||'Spike triggered','warn');
    let step=0;
    const steps=[{c:60,m:65,r:120},{c:82,m:75,r:280},{c:95,m:88,r:490},{c:98,m:92,r:650},{c:78,m:80,r:380},{c:55,m:65,r:200},{c:30,m:50,r:90},{c:cpuBase,m:memBase,r:rpsBase}];
    const iv=setInterval(()=>{
      if(step>=steps.length){clearInterval(iv);addLog('Load normalised','ok');return;}
      const s=steps[step++];setLoad(s.c,s.m,s.r);
    },900);
  }catch(e){addLog('Spike failed: '+e.message,'err');}
}

function setLoad(cpu,mem,rps){
  document.getElementById('cpu-v').textContent=cpu+'%';
  document.getElementById('mem-v').textContent=mem+'%';
  document.getElementById('rps-v').textContent=rps;
  document.getElementById('cpu-b').style.cssText=`width:${cpu}%;background:${cpu>80?'#ef4444':cpu>60?'#f59e0b':'#3b82f6'}`;
  document.getElementById('mem-b').style.cssText=`width:${mem}%;background:${mem>80?'#ef4444':mem>60?'#f59e0b':'#10b981'}`;
  document.getElementById('rps-b').style.cssText=`width:${Math.min(rps/7,100)}%;background:#f59e0b`;
}

const evtSource = new EventSource("/api/stream");
evtSource.onmessage = function(e) {
  const data = JSON.parse(e.data);
  if (data.error) { addLog("SSE error: " + data.error, "err"); return; }
  loadPods();
  document.getElementById("st-msgs").textContent = data.msg_count;
};
evtSource.onerror = function() {
  addLog("SSE connection lost - reconnecting...", "warn");
};

setInterval(()=>{
  uptimeSecs++;
  document.getElementById('st-uptime').textContent=fmtUp(uptimeSecs);
  setLoad(cpuBase+rnd(-3,3),memBase+rnd(-2,2),rpsBase+rnd(-1,2));
},1000);

addLog('App connected · namespace: default','info');
loadMsgs();
loadPods();
</script>
</body>
</html>
